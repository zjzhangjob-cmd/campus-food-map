<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 / 注册 · 觅食</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209; --paper: #fdf6e3; --accent: #e85d26;
    --accent2: #f4b942; --muted: #8a7a6a; --border: #e8dcc8;
    --card: #fffdf7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; background:var(--paper);
    font-family:'Noto Sans SC',sans-serif; color:var(--ink);
    display:flex; align-items:center; justify-content:center;
  }
  .bg-deco {
    position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 60% 50% at 20% 30%, rgba(232,93,38,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 80% 70%, rgba(244,185,66,0.08) 0%, transparent 70%);
  }
  .box {
    background:var(--card); border:1.5px solid var(--border);
    border-radius:24px; padding:40px; width:420px; max-width:95vw;
    box-shadow:0 12px 48px rgba(26,18,9,0.08); position:relative; z-index:1;
  }
  .logo {
    text-align:center; margin-bottom:32px;
  }
  .logo-main { font-family:'Noto Serif SC',serif; font-size:28px; font-weight:900; }
  .logo-dot { display:inline-block; width:8px; height:8px; background:var(--accent); border-radius:50%; margin:0 4px 3px; }
  .logo-sub { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:4px; }

  .tabs { display:flex; gap:0; margin-bottom:28px; border:1.5px solid var(--border); border-radius:12px; overflow:hidden; }
  .tab {
    flex:1; padding:10px; text-align:center; font-size:14px; cursor:pointer;
    background:transparent; border:none; color:var(--muted); transition:all .2s;
    font-family:'Noto Sans SC',sans-serif;
  }
  .tab.active { background:var(--ink); color:var(--paper); }

  .form-group { margin-bottom:16px; }
  label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-family:'DM Mono',monospace; }
  input, select {
    width:100%; padding:12px 14px; border:1.5px solid var(--border);
    border-radius:10px; font-size:14px; background:var(--paper);
    font-family:'Noto Sans SC',sans-serif; color:var(--ink);
    outline:none; transition:border-color .2s;
  }
  input:focus, select:focus { border-color:var(--accent); }

  .btn {
    width:100%; padding:14px; border-radius:12px; border:none;
    font-size:15px; font-family:'Noto Sans SC',sans-serif;
    cursor:pointer; transition:all .2s; margin-top:8px;
  }
  .btn-primary {
    background:var(--accent); color:white;
    box-shadow:0 4px 16px rgba(232,93,38,.3);
  }
  .btn-primary:hover { background:#d14e1a; transform:translateY(-1px); }
  .btn-primary:disabled { opacity:.6; cursor:not-allowed; transform:none; }

  .error-msg { color:var(--accent); font-size:12px; margin-top:8px; display:none; }
  .divider { text-align:center; color:var(--muted); font-size:12px; margin:16px 0; position:relative; }
  .divider::before, .divider::after {
    content:''; position:absolute; top:50%; width:38%; height:1px; background:var(--border);
  }
  .divider::before { left:0; } .divider::after { right:0; }

  .back-link { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
  .back-link a { color:var(--accent); text-decoration:none; font-weight:500; }
</style>
</head>
<body>
<div class="bg-deco"></div>
<div class="box">
  <div class="logo">
    <div><span class="logo-main">觅食</span><span class="logo-dot"></span></div>
    <div class="logo-sub">大学城美食地图</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
    <button class="tab" id="tabRegister" onclick="switchTab('register')">注册</button>
  </div>

  <!-- 登录表单 -->
  <div id="loginForm">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password">
    </div>
    <div class="error-msg" id="loginError"></div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">登录</button>

    <div class="divider">或快速体验</div>
    <button class="btn" style="background:var(--paper);border:1.5px solid var(--border);color:var(--ink)"
            onclick="demoLogin()">🎓 使用测试账号登录</button>
  </div>

  <!-- 注册表单 -->
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="regUsername" placeholder="2-20个字符" autocomplete="username">
    </div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="regPassword" placeholder="至少6位" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>昵称（选填）</label>
      <input type="text" id="regNickname" placeholder="你的昵称">
    </div>
    <div class="form-group">
      <label>所在校区</label>
      <select id="regCampus">
        <option value="">请选择</option>
        <option value="理工大">理工大</option>
        <option value="师范大">师范大</option>
        <option value="医科大">医科大</option>
        <option value="财经大">财经大</option>
      </select>
    </div>
    <div class="error-msg" id="registerError"></div>
    <button class="btn btn-primary" id="registerBtn" onclick="doRegister()">创建账号</button>
  </div>

  <div class="back-link">
    <a href="index.html">← 返回美食地图</a>
  </div>
</div>

<script src="assets/api.js"></script>
<script>
  // 已登录则跳转
  if (Auth.isLoggedIn()) window.location.href = "index.html";

  function switchTab(tab) {
    document.getElementById("loginForm").style.display    = tab === "login"    ? "" : "none";
    document.getElementById("registerForm").style.display = tab === "register" ? "" : "none";
    document.getElementById("tabLogin").classList.toggle("active",    tab === "login");
    document.getElementById("tabRegister").classList.toggle("active", tab === "register");
  }

  async function doLogin() {
    const btn = document.getElementById("loginBtn");
    const errEl = document.getElementById("loginError");
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    if (!username || !password) { showErr(errEl, "请填写用户名和密码"); return; }

    btn.disabled = true; btn.textContent = "登录中…";
    try {
      const res = await AuthAPI.login({ username, password });
      Auth.setToken(res.access_token);
      Auth.setUser(res.user);
      showToast("登录成功！正在跳转…", "success");
      setTimeout(() => { window.location.href = "index.html"; }, 800);
    } catch (e) {
      showErr(errEl, e.message);
      btn.disabled = false; btn.textContent = "登录";
    }
  }

  async function demoLogin() {
    document.getElementById("loginUsername").value = "student";
    document.getElementById("loginPassword").value = "student123";
    await doLogin();
  }

  async function doRegister() {
    const btn = document.getElementById("registerBtn");
    const errEl = document.getElementById("registerError");
    const data = {
      username: document.getElementById("regUsername").value.trim(),
      email:    document.getElementById("regEmail").value.trim(),
      password: document.getElementById("regPassword").value,
      nickname: document.getElementById("regNickname").value.trim(),
      campus:   document.getElementById("regCampus").value,
    };
    if (!data.username || !data.email || !data.password) { showErr(errEl, "请填写必填项"); return; }

    btn.disabled = true; btn.textContent = "注册中…";
    try {
      const res = await AuthAPI.register(data);
      Auth.setToken(res.access_token);
      Auth.setUser(res.user);
      showToast("注册成功！欢迎加入觅食 🎉", "success");
      setTimeout(() => { window.location.href = "index.html"; }, 800);
    } catch (e) {
      showErr(errEl, e.message);
      btn.disabled = false; btn.textContent = "创建账号";
    }
  }

  function showErr(el, msg) {
    el.textContent = msg; el.style.display = "block";
    setTimeout(() => { el.style.display = "none"; }, 4000);
  }

  // Enter 键提交
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    if (document.getElementById("loginForm").style.display !== "none") doLogin();
    else doRegister();
  });
</script>
</body>
</html>
