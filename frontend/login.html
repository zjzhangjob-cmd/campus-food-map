<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 / 注册 · 觅食</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1209;--paper:#fdf6e3;--accent:#e85d26;--accent2:#f4b942;--muted:#8a7a6a;--border:#e8dcc8;--card:#fffdf7;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:var(--paper);font-family:'Noto Sans SC',sans-serif;color:var(--ink);display:flex;align-items:center;justify-content:center;overflow:hidden;}

  /* 动态背景 */
  .bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
  .bg-blob{position:absolute;border-radius:50%;filter:blur(60px);animation:blobFloat 8s ease-in-out infinite;}
  .bg-blob:nth-child(1){width:400px;height:400px;background:rgba(232,93,38,.08);top:-100px;left:-100px;animation-delay:0s;}
  .bg-blob:nth-child(2){width:300px;height:300px;background:rgba(244,185,66,.1);bottom:-80px;right:-80px;animation-delay:3s;}
  .bg-blob:nth-child(3){width:200px;height:200px;background:rgba(45,122,79,.06);top:50%;left:50%;animation-delay:1.5s;}
  @keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-20px) scale(1.05)}66%{transform:translate(-15px,15px) scale(.95)}}

  /* 浮动食物装饰 */
  .food-float{position:fixed;font-size:28px;pointer-events:none;animation:foodDrift linear infinite;opacity:.15;}
  @keyframes foodDrift{0%{transform:translateY(100vh) rotate(0deg)}100%{transform:translateY(-100px) rotate(360deg)}}

  .box{background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:40px;width:440px;max-width:95vw;position:relative;z-index:1;
    box-shadow:0 20px 60px rgba(26,18,9,.1);
    animation:boxIn .6s cubic-bezier(.16,1,.3,1) both;}
  @keyframes boxIn{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

  .logo{text-align:center;margin-bottom:32px;}
  .logo-ring{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 8px 24px rgba(232,93,38,.3);animation:logoSpin 0s;}
  .logo-main{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:900;}
  .logo-dot{display:inline-block;width:8px;height:8px;background:var(--accent);border-radius:50%;margin:0 4px 3px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
  .logo-sub{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px;}

  .tabs{display:flex;gap:0;margin-bottom:28px;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
  .tab{flex:1;padding:11px;text-align:center;font-size:14px;cursor:pointer;background:transparent;border:none;color:var(--muted);transition:all .2s;font-family:'Noto Sans SC',sans-serif;}
  .tab.active{background:var(--ink);color:var(--paper);}

  .form-group{margin-bottom:16px;}
  label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;font-family:'DM Mono',monospace;letter-spacing:.5px;}
  .input-wrap{position:relative;}
  input,select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:var(--paper);font-family:'Noto Sans SC',sans-serif;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,93,38,.08);}
  .input-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}

  .btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;transition:all .2s;margin-top:8px;}
  .btn-primary{background:var(--accent);color:white;box-shadow:0 4px 16px rgba(232,93,38,.3);}
  .btn-primary:hover{background:#d14e1a;transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,93,38,.35);}
  .btn-primary:active{transform:translateY(0);}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
  .btn-demo{background:var(--paper);border:1.5px solid var(--border);color:var(--ink);}
  .btn-demo:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .divider{text-align:center;color:var(--muted);font-size:12px;margin:16px 0;position:relative;}
  .divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
  .divider::before{left:0}.divider::after{right:0}

  .error-msg{color:var(--accent);font-size:12px;margin-top:8px;padding:8px 12px;background:#fce4e4;border-radius:8px;display:none;animation:fadeUp .3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  .features{display:flex;gap:16px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
  .feature{flex:1;text-align:center;}
  .feature-icon{font-size:20px;margin-bottom:4px;}
  .feature-text{font-size:11px;color:var(--muted);}

  .back-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
  .back-link a{color:var(--accent);text-decoration:none;font-weight:500;}

  /* 收藏入口提示 */
  .fav-hint{background:linear-gradient(135deg,#fff8ee,#fff3e0);border:1.5px solid var(--accent2);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--ink);line-height:1.5;}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
</div>

<!-- 浮动食物 -->
<script>
['🍜','🍣','🥗','🍕','☕','🥘','🧋','🍱'].forEach((f,i) => {
  const el = document.createElement('div');
  el.className = 'food-float';
  el.textContent = f;
  el.style.left = (10 + i * 12) + '%';
  el.style.animationDuration = (12 + i * 2) + 's';
  el.style.animationDelay = (i * 1.5) + 's';
  el.style.fontSize = (20 + Math.random() * 16) + 'px';
  document.body.appendChild(el);
});
</script>

<div class="box">
  <div class="logo">
    <div class="logo-ring">🍜</div>
    <div><span class="logo-main">觅食</span><span class="logo-dot"></span></div>
    <div class="logo-sub">大学城美食地图</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
    <button class="tab" id="tabRegister" onclick="switchTab('register')">注册</button>
  </div>

  <!-- 登录 -->
  <div id="loginForm">
    <div class="fav-hint">❤️ 登录后可<strong>收藏餐厅</strong>、<strong>发布评价</strong>、<strong>使用校园圈</strong></div>
    <div class="form-group">
      <label>用户名</label>
      <div class="input-wrap">
        <input type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username">
        <span class="input-icon">👤</span>
      </div>
    </div>
    <div class="form-group">
      <label>密码</label>
      <div class="input-wrap">
        <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password">
        <span class="input-icon">🔒</span>
      </div>
    </div>
    <div class="error-msg" id="loginError"></div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">登录账号</button>
    <div class="divider">或快速体验</div>
    <button class="btn btn-demo" onclick="demoLogin()">🎓 使用测试账号登录</button>
  </div>

  <!-- 注册 -->
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label>用户名 *</label>
      <div class="input-wrap">
        <input type="text" id="regUsername" placeholder="2-20个字符" autocomplete="username">
        <span class="input-icon">👤</span>
      </div>
    </div>
    <div class="form-group">
      <label>邮箱 *</label>
      <div class="input-wrap">
        <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
        <span class="input-icon">📧</span>
      </div>
    </div>
    <div class="form-group">
      <label>密码 *（至少6位）</label>
      <div class="input-wrap">
        <input type="password" id="regPassword" placeholder="设置密码" autocomplete="new-password">
        <span class="input-icon">🔒</span>
      </div>
    </div>
    <div class="form-group">
      <label>昵称（选填）</label>
      <input type="text" id="regNickname" placeholder="你的昵称">
    </div>
    <div class="form-group">
      <label>所在校区</label>
      <select id="regCampus">
        <option value="">请选择校区</option>
        <option value="理工大">理工大</option>
        <option value="师范大">师范大</option>
        <option value="医科大">医科大</option>
        <option value="财经大">财经大</option>
        <option value="华师大">华师大</option>
        <option value="中山大">中山大</option>
        <option value="暨南大">暨南大</option>
      </select>
    </div>
    <div class="error-msg" id="registerError"></div>
    <button class="btn btn-primary" id="registerBtn" onclick="doRegister()">创建账号 →</button>
  </div>

  <div class="features">
    <div class="feature"><div class="feature-icon">❤️</div><div class="feature-text">收藏餐厅</div></div>
    <div class="feature"><div class="feature-icon">⭐</div><div class="feature-text">发布评价</div></div>
    <div class="feature"><div class="feature-icon">👥</div><div class="feature-text">校园圈</div></div>
    <div class="feature"><div class="feature-icon">🤖</div><div class="feature-text">AI推荐</div></div>
  </div>

  <div class="back-link"><a href="index.html">← 返回美食地图</a></div>
</div>

<script src="assets/api.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = "index.html";

  function switchTab(tab) {
    document.getElementById("loginForm").style.display    = tab==='login'    ? "" : "none";
    document.getElementById("registerForm").style.display = tab==='register' ? "" : "none";
    document.getElementById("tabLogin").classList.toggle("active",    tab==='login');
    document.getElementById("tabRegister").classList.toggle("active", tab==='register');
  }

  async function doLogin() {
    const btn=document.getElementById("loginBtn"), errEl=document.getElementById("loginError");
    const username=document.getElementById("loginUsername").value.trim();
    const password=document.getElementById("loginPassword").value;
    if (!username||!password){showErr(errEl,"请填写用户名和密码");return;}
    btn.disabled=true; btn.textContent="登录中…";
    try {
      const res=await AuthAPI.login({username,password});
      Auth.setToken(res.access_token); Auth.setUser(res.user);
      showToast("登录成功！正在跳转…","success");
      setTimeout(()=>{window.location.href="index.html";},700);
    } catch(e){showErr(errEl,e.message);btn.disabled=false;btn.textContent="登录账号";}
  }

  async function demoLogin(){
    document.getElementById("loginUsername").value="student";
    document.getElementById("loginPassword").value="student123";
    await doLogin();
  }

  async function doRegister() {
    const btn=document.getElementById("registerBtn"), errEl=document.getElementById("registerError");
    const data={
      username:document.getElementById("regUsername").value.trim(),
      email:document.getElementById("regEmail").value.trim(),
      password:document.getElementById("regPassword").value,
      nickname:document.getElementById("regNickname").value.trim(),
      campus:document.getElementById("regCampus").value,
    };
    if (!data.username||!data.email||!data.password){showErr(errEl,"请填写必填项");return;}
    btn.disabled=true; btn.textContent="注册中…";
    try {
      const res=await AuthAPI.register(data);
      Auth.setToken(res.access_token); Auth.setUser(res.user);
      showToast("注册成功！欢迎加入觅食 🎉","success");
      setTimeout(()=>{window.location.href="index.html";},700);
    } catch(e){showErr(errEl,e.message);btn.disabled=false;btn.textContent="创建账号 →";}
  }

  function showErr(el,msg){el.textContent=msg;el.style.display="block";setTimeout(()=>{el.style.display="none";},4000);}
  document.addEventListener("keydown",e=>{if(e.key!=="Enter")return;if(document.getElementById("loginForm").style.display!=="none")doLogin();else doRegister();});
</script>
</body>
</html>
